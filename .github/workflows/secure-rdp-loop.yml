name: Secure RDP via Tailscale (Automated Loop)

on:
  workflow_dispatch:
    inputs:
      gh_api_token:
        description: "🔒 ToolboxLap | ENTER YOUR GITHUB PAT HERE (Starts with ghp_...)"
        required: true
        default: ""
      loops:
        description: "🔄 System Internal Counter (Leave Empty - Managed Automatically)"
        required: false
        default: ""

concurrency:
  group: rdp-loop-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 360
    steps:
      - name: 🔒 Executing Secured Core Engine
        run: |
          $token = "${{ github.event.inputs.gh_api_token }}"
          if (-not $token -or -not ($token -match '^ghp_[a-zA-Z0-9]+$')) {
              Write-Error "❌ Invalid Token!"
              exit 1
          }

          # 📢 Injecting Cryptographic Brand Protection Into Job Summary
          $b1 = [int[]](35,32,120,50,104,111,115,116,115,46,99,111,109,32,79,70,70,73,67,73,65,76,32,82,68,80,32,65,85,84,79,77,65,84,73,79,78)
          $b2 = [int[]](42,32,42,42,67,111,112,121,114,105,103,104,116,32,169,32,50,48,50,54,32,84,111,111,108,98,111,120,76,97,112,46,99,111,109,42,42)
          $b3 = [int[]](42,32,71,117,97,114,97,110,116,101,101,100,32,98,121,32,91,84,111,111,108,98,111,120,76,97,112,46,99,111,109,93,40,104,116,116,112,115,58,47,47,119,119,119,46,116,111,111,108,98,111,120,108,97,112,46,99,111,109,47,41)
          $b4 = [int[]](42,32,91,83,117,98,115,99,114,105,98,101,32,111,110,32,89,111,117,84,117,98,101,93,40,104,116,116,112,115,58,47,47,119,119,119,46,121,111,117,116,117,98,101,46,99,111,109,47,99,104,97,110,110,101,108,47,85,67,68,84,52,102,115,57,74,119,114,110,81,73,88,80,114,88,88,56,121,72,101,81,41)
          
          $s1 = [string][char[]]$b1; $s2 = [string][char[]]$b2; $s3 = [string][char[]]$b3; $s4 = [string][char[]]$b4
          "$s1`n`n### 🔒 Security Info`n$s2`n$s3`n$s4" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          # 🛡️ Anti-Tamper Hard Enforcement
          if ($s3 -notlike "*ToolboxLap.com*") { Write-Error "Tamper Detected!"; exit 1 }

          # ⚙️ Static Dynamic Config Engine (Obfuscated Variables)
          $u = [string][char[]](84,111,111,108,98,111,120,76,97,112)
          $p = [string][char[]](97,100,109,105,110,64,49,50,51)
          $f = "D:\" + $u + " link subscribe youtube channel"

          if (-Not (Test-Path -Path $f)) { New-Item -Path $f -ItemType Directory | Out-Null }
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale" | Out-Null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 | Out-Null
          Restart-Service -Name TermService -Force

          $securePass = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $u -Password $securePass -AccountNeverExpires | Out-Null
          }
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u

          # 🌐 Silent Tailscale Engine
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\ts.msi`"", "/quiet", "/norestart" -Wait
          Remove-Item "$env:TEMP\ts.msi" -Force

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-toolboxlap-${{ github.run_number }} --accept-routes
          
          $tsIP = $null; $r = 0
          while (-not $tsIP -and $r -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5; $r++
          }
          if (-not $tsIP) { Write-Error "Network Fail"; exit 1 }

          Write-Host "Address: $tsIP `nUsername: $u `nPassword: $p"

          # ⏱️ Obfuscated Runtime Controller (5 Hours 40 Minutes Production Loop)
          $m = 340
          for ($i = 1; $i -le $m; $i++) {
              $l = $m - $i
              Write-Host "[$(Get-Date)] Running Tracker: $l min remaining."
              Start-Sleep -Seconds 60
          }

          # 🔁 Secured Chain Rotation Engine
          $inputLoops = "${{ github.event.inputs.loops }}"
          $loops = if (-not $inputLoops) { 4 } else { [int]$inputLoops }
          if ($loops -eq 1) { Write-Host "🎯 Chain Finished Successfully."; exit 0 }
          
          $next = $loops - 1
          $body = @{
            ref    = "${{ github.ref_name }}"
            inputs = @{ gh_api_token = "$token"; loops = "$next" }
          } | ConvertTo-Json -Depth 5

          Invoke-RestMethod -Method POST `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/secure-rdp-loop.yml/dispatches" `
            -Headers @{ Authorization = "Bearer $token"; "Accept"="application/vnd.github+json" } `
            -Body $body
          Write-Host "✅ Secured handoff executed to loop iteration: $next"
